name: Run OLX Scraper

on:
  workflow_dispatch:
    inputs:
      payload:
        description: "JSON input"
        required: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py '${{ github.event.inputs.payload }}'

      - name: Upload result
        uses: actions/upload-artifact@v3
        with:
          name: report
          path: output.xlsx
